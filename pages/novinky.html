<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Sušenka Web | Novinky a Eventy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">

  <style>
    .post-grid {
      display: grid;
      gap: 14px;
    }

    .post-card {
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 16px;
    }

    .post-card small {
      opacity: .65;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      font-weight: 800;
      margin-right: 8px;
    }

    .event {
      outline: 1px solid rgba(255, 220, 120, .18);
    }

    .news {
      outline: 1px solid rgba(170, 150, 255, .18);
    }

    .status {
      color: var(--muted);
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="../images/susenka.png" alt="logo" class="brand-logo">
      <span class="brand-name">Sušenka <b>Web</b></span>
    </div>

    <nav class="nav">
      <a href="../index.html">Domů</a>
      <a href="hra.html">Hra</a>
      <a href="novinky.html">Novinky</a>
      <a href="chat.html">Chat</a>
      <a href="admin.html">Admin</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <section class="card hero animate-pop">
      <h1>Novinky a eventy 📢</h1>
      <p>Tady se zobrazují příspěvky od adminů.</p>
    </section>

    <section class="card">
      <div id="posts" class="post-grid">
        <p class="status">Načítám...</p>
      </div>
    </section>
  </main>

  <footer class="footer">© 2026 Sušenka Web</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/app.js"></script>

  <script>
    const db = window.SUSENKA.supabase;
    const cfg = window.SUSENKA.config;
    const postsEl = document.getElementById("posts");

    async function loadPosts() {
      if (!db) {
        postsEl.innerHTML = `<p class="status">Databáze není nastavená.</p>`;
        return;
      }

      const { data, error } = await db
        .from(cfg.postsTable)
        .select("id, type, title, body, starts_at, created_at")
        .order("created_at", { ascending: false })
        .limit(50);

      if (error) {
        console.error(error);
        postsEl.innerHTML = `<p class="status">Novinky se nepodařilo načíst.</p>`;
        return;
      }

      if (!data.length) {
        postsEl.innerHTML = `<p class="status">Zatím tu nejsou žádné novinky ani eventy.</p>`;
        return;
      }

      postsEl.innerHTML = data.map(post => {
        const isEvent = post.type === "event";

        return `
          <article class="post-card ${isEvent ? "event" : "news"}">
            <small>
              <span class="badge">${isEvent ? "EVENT" : "NEWS"}</span>
              ${window.SUSENKA.formatDateCZ(post.created_at)}
            </small>

            <h2>${window.SUSENKA.escapeHTML(post.title)}</h2>

            ${isEvent && post.starts_at ? `
              <p><b>Čas eventu:</b> ${window.SUSENKA.formatDateCZ(post.starts_at)}</p>
            ` : ""}

            <p>${window.SUSENKA.escapeHTML(post.body)}</p>
          </article>
        `;
      }).join("");
    }

    loadPosts();
  </script>
</body>
</html>
