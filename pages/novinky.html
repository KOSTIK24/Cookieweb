<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Sušenka Web | Novinky</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">

  <style>
    .posts-grid {
      display: grid;
      gap: 14px;
    }

    .post-card {
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 16px;
    }

    .post-card small {
      opacity: .7;
    }

    .post-card.news {
      box-shadow: inset 0 0 0 1px rgba(120,180,255,.08);
    }

    .post-card.event {
      box-shadow: inset 0 0 0 1px rgba(255,220,120,.12);
    }

    .badge {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      font-weight: 900;
      font-size: 12px;
      margin-right: 6px;
    }

    .status {
      color: var(--muted);
    }

    .danger {
      color: #ffb4b4;
      font-weight: 800;
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="../images/susenka.png" alt="logo" class="brand-logo">
      <span class="brand-name">Sušenka <b>Web</b></span>
    </div>

    <nav class="nav">
      <a href="../index.html">Domů</a>
      <a href="hra.html">Hra</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="novinky.html" class="active">Novinky</a>
      <a href="chat.html">Chat</a>
      <a href="team.html">Team</a>
      <a href="kontakt.html">Kontakt</a>
      <a href="faq.html">FAQ</a>
      <a href="admin.html">Admin</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <section class="card hero animate-pop">
      <h1>Novinky & Eventy 📢</h1>
      <p>Tady najdeš poslední news a eventy ze Sušenka Webu.</p>

      <div class="controls">
        <button class="btn" onclick="loadPosts()">Refresh</button>
        <a class="btn" href="admin.html">Admin panel</a>
      </div>
    </section>

    <section class="card">
      <h2>Feed</h2>

      <div id="postsList" class="posts-grid">
        <p class="status">Načítám novinky...</p>
      </div>
    </section>
  </main>

  <footer class="footer">© 2026 Sušenka Web</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/app.js"></script>

  <script>
    const db = window.SUSENKA.supabase;
    const cfg = window.SUSENKA.config;
    const postsList = document.getElementById("postsList");

    async function loadPosts() {
      if (!db) {
        postsList.innerHTML = `<p class="status danger">Databáze není nastavená.</p>`;
        return;
      }

      postsList.innerHTML = `<p class="status">Načítám...</p>`;

      const { data, error } = await db
        .from(cfg.postsTable)
        .select("id, type, title, body, starts_at, created_at")
        .order("created_at", { ascending: false })
        .limit(50);

      if (error) {
        console.error(error);
        postsList.innerHTML = `<p class="status danger">Novinky se nepodařilo načíst.</p>`;
        return;
      }

      if (!data || data.length === 0) {
        postsList.innerHTML = `<p class="status">Zatím tu nejsou žádné novinky.</p>`;
        return;
      }

      postsList.innerHTML = data.map(post => {
        const isEvent = post.type === "event";

        return `
          <article class="post-card ${isEvent ? "event" : "news"}">
            <small>
              <span class="badge">${isEvent ? "EVENT" : "NEWS"}</span>
              ${window.SUSENKA.formatDateCZ(post.created_at)}
            </small>

            <h2>${window.SUSENKA.escapeHTML(post.title)}</h2>

            ${isEvent && post.starts_at ? `
              <p><b>Čas eventu:</b> ${window.SUSENKA.formatDateCZ(post.starts_at)}</p>
            ` : ""}

            <p>${window.SUSENKA.escapeHTML(post.body)}</p>
          </article>
        `;
      }).join("");
    }

    loadPosts();
  </script>

  <script src="../config/global-widgets.js"></script>
</body>
</html>
