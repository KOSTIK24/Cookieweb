<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Sušenka Web | Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">

  <style>
    .chat-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .chat-box {
      min-height: 340px;
      max-height: 520px;
      overflow-y: auto;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.18);
    }

    .chat-message {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .chat-message h3 {
      margin: 0 0 5px;
      font-size: 16px;
    }

    .chat-message p {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-message small {
      opacity: .65;
      display: block;
      margin-bottom: 5px;
    }

    .chat-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .chat-form input {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.22);
      color: white;
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
    }

    .status {
      color: var(--muted);
    }

    .danger {
      color: #ffb4b4;
      font-weight: 800;
    }

    .success {
      color: #baffc9;
      font-weight: 800;
    }

    @media (max-width: 700px) {
      .chat-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="../images/susenka.png" alt="logo" class="brand-logo">
      <span class="brand-name">Sušenka <b>Web</b></span>
    </div>

    <nav class="nav">
      <a href="../index.html">Domů</a>
      <a href="hra.html">Hra</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="novinky.html">Novinky</a>
      <a href="chat.html" class="active">Chat</a>
      <a href="team.html">Team</a>
      <a href="kontakt.html">Kontakt</a>
      <a href="faq.html">FAQ</a>
      <a href="admin.html">Admin</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <section class="card hero animate-pop">
      <h1>Sušenka Chat 💬</h1>
      <p>Piš si s ostatními členy komunity. Psát můžou přihlášení uživatelé.</p>
      <p id="chatStatus" class="status">Načítám chat...</p>
    </section>

    <section class="card chat-layout">
      <div id="chatBox" class="chat-box">
        <p class="status">Načítám zprávy...</p>
      </div>

      <div class="chat-form">
        <input id="chatInput" maxlength="300" placeholder="Napiš zprávu...">
        <button class="btn primary" onclick="sendMessage()">Odeslat</button>
      </div>

      <div class="controls">
        <button class="btn" onclick="loadMessages()">Refresh</button>
        <a class="btn" href="login.html">Login</a>
      </div>
    </section>
  </main>

  <footer class="footer">© 2026 Sušenka Web</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/app.js"></script>

  <script>
    const db = window.SUSENKA.supabase;
    const cfg = window.SUSENKA.config;

    const chatBox = document.getElementById("chatBox");
    const chatInput = document.getElementById("chatInput");
    const chatStatus = document.getElementById("chatStatus");

    let currentUser = null;
    let currentProfile = null;
    let lastSendAt = 0;

    function setChatStatus(text, danger = false, success = false) {
      chatStatus.textContent = text;
      chatStatus.className = danger ? "status danger" : success ? "status success" : "status";
    }

    async function initChat() {
      if (!db) {
        setChatStatus("Databáze není nastavená.", true);
        chatBox.innerHTML = `<p class="status danger">Databáze není nastavená.</p>`;
        return;
      }

      currentUser = await window.SUSENKA.getCurrentUser();

      if (currentUser) {
        currentProfile = await window.SUSENKA.getCurrentProfile();
        setChatStatus(`Přihlášen jako ${currentProfile?.username || currentUser.email}`, false, true);
      } else {
        setChatStatus("Nejsi přihlášený. Můžeš číst, ale pro psaní se přihlas.", false);
      }

      await loadMessages();

      setInterval(loadMessages, 3000);

      try {
        db
          .channel("site-chat-live")
          .on(
            "postgres_changes",
            {
              event: "*",
              schema: "public",
              table: cfg.chatTable
            },
            () => loadMessages()
          )
          .subscribe();
      } catch (error) {
        console.warn("Realtime chat neběží, používám polling.", error);
      }
    }

    async function loadMessages() {
      if (!db) return;

      const { data, error } = await db
        .from(cfg.chatTable)
        .select("id, username, message, created_at")
        .order("created_at", { ascending: false })
        .limit(cfg.maxChatMessages || 80);

      if (error) {
        console.error(error);
        chatBox.innerHTML = `<p class="status danger">Chat se nepodařilo načíst.</p>`;
        return;
      }

      if (!data || data.length === 0) {
        chatBox.innerHTML = `<p class="status">Chat je zatím prázdný.</p>`;
        return;
      }

      const messages = [...data].reverse();

      chatBox.innerHTML = messages.map(msg => `
        <div class="chat-message">
          <small>${window.SUSENKA.formatDateCZ(msg.created_at)}</small>
          <h3>${window.SUSENKA.escapeHTML(msg.username || "user")}</h3>
          <p>${window.SUSENKA.escapeHTML(msg.message || "")}</p>
        </div>
      `).join("");

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      if (!db) return setChatStatus("Databáze není nastavená.", true);

      currentUser = currentUser || await window.SUSENKA.getCurrentUser();

      if (!currentUser) {
        setChatStatus("Nejdřív se přihlas.", true);
        return;
      }

      const now = Date.now();

      if (now - lastSendAt < 1000) {
        setChatStatus("Počkej chvilku před další zprávou.", true);
        return;
      }

      lastSendAt = now;

      const message = chatInput.value.trim().slice(0, cfg.maxChatLength || 300);

      if (!message) {
        setChatStatus("Zpráva nesmí být prázdná.", true);
        return;
      }

      currentProfile = currentProfile || await window.SUSENKA.getCurrentProfile();

      const username = currentProfile?.username || currentUser.email?.split("@")[0] || "user";

      const { error } = await db
        .from(cfg.chatTable)
        .insert({
          username,
          message,
          user_id: currentUser.id
        });

      if (error) {
        console.error(error);
        setChatStatus("Zpráva se nepodařila odeslat.", true);
        return;
      }

      chatInput.value = "";
      setChatStatus("Zpráva odeslána.", false, true);
      loadMessages();
    }

    chatInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    initChat();
  </script>

  <script src="../config/global-widgets.js"></script>
</body>
</html>
