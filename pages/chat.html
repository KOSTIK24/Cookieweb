<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Sušenka Web | Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">

  <style>
    .chat-messages {
      height: 420px;
      overflow-y: auto;
      background: rgba(0,0,0,.20);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 16px;
      padding: 12px;
    }

    .chat-message {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 10px 12px;
      margin-bottom: 10px;
      word-break: break-word;
      animation: pop .18s ease;
    }

    .chat-message strong {
      display: block;
      margin-bottom: 4px;
    }

    .chat-message small {
      opacity: .65;
      font-size: 11px;
      float: right;
    }

    .chat-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 12px;
    }

    .chat-form input {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.22);
      color: white;
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
    }

    .status {
      color: var(--muted);
      margin-top: 10px;
    }

    .danger {
      color: #ffb4b4;
      font-weight: 800;
    }

    .success {
      color: #baffc9;
      font-weight: 800;
    }

    @media (max-width: 850px) {
      .chat-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="../images/susenka.png" alt="logo" class="brand-logo">
      <span class="brand-name">Sušenka <b>Web</b></span>
    </div>

    <nav class="nav">
      <a href="../index.html">Domů</a>
      <a href="hra.html">Hra</a>
      <a href="novinky.html">Novinky</a>
      <a href="chat.html" class="active">Chat</a>
      <a href="team.html">Team</a>
      <a href="kontakt.html">Kontakt</a>
      <a href="faq.html">FAQ</a>
      <a href="admin.html">Admin</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <section class="card hero animate-pop">
      <h1>Sušenka Chat 💬</h1>
      <p>Společný chat pro přihlášené uživatele.</p>
      <p id="userInfo" class="status">Kontroluju login...</p>
    </section>

    <section class="card">
      <div id="chatMessages" class="chat-messages">
        <p class="status">Načítám...</p>
      </div>

      <div class="chat-form">
        <input id="chatInput" maxlength="300" placeholder="Napiš zprávu..." autocomplete="off">
        <button class="btn primary" id="sendButton" onclick="sendMessage()">Poslat</button>
      </div>

      <p id="chatStatus" class="status"></p>
    </section>
  </main>

  <footer class="footer">© 2026 Sušenka Web</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/app.js"></script>

  <script>
    const db = window.SUSENKA.supabase;
    const cfg = window.SUSENKA.config;

    const chatMessages = document.getElementById("chatMessages");
    const chatInput = document.getElementById("chatInput");
    const sendButton = document.getElementById("sendButton");
    const chatStatus = document.getElementById("chatStatus");
    const userInfo = document.getElementById("userInfo");

    let currentUser = null;
    let currentProfile = null;
    let chatChannel = null;
    let lastChatSendAt = 0;
const CHAT_COOLDOWN_MS = 1000;

    const seenMessageIds = new Set();
    let lastMessageId = 0;
    let isLoadingNewMessages = false;

    function setStatus(text, danger = false, success = false) {
      chatStatus.textContent = text;
      chatStatus.className = danger ? "status danger" : success ? "status success" : "status";
    }

    function clearEmptyMessage() {
      const empty = chatMessages.querySelector(".status");
      if (empty) {
        chatMessages.innerHTML = "";
      }
    }

    function renderMessage(row) {
      if (!row || !row.id) return;

      const id = Number(row.id);

      if (seenMessageIds.has(id)) {
        return;
      }

      seenMessageIds.add(id);

      if (id > lastMessageId) {
        lastMessageId = id;
      }

      clearEmptyMessage();

      const div = document.createElement("div");
      div.className = "chat-message";

      div.innerHTML = `
        <small>${window.SUSENKA.formatDateCZ(row.created_at)}</small>
        <strong>${window.SUSENKA.escapeHTML(row.username || "user")}</strong>
        <div>${window.SUSENKA.escapeHTML(row.message || "")}</div>
      `;

      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function initChat() {
      if (!db) {
        chatMessages.innerHTML = `<p class="status danger">Databáze není nastavená.</p>`;
        chatInput.disabled = true;
        sendButton.disabled = true;
        return;
      }

      currentUser = await window.SUSENKA.getCurrentUser();
      currentProfile = await window.SUSENKA.getCurrentProfile();

      if (!currentUser) {
        userInfo.innerHTML = `Nejsi přihlášený. <a href="login.html">Přihlas se tady.</a>`;
        chatInput.disabled = true;
        sendButton.disabled = true;
      } else {
        userInfo.innerHTML = `Píšeš jako <b>${window.SUSENKA.escapeHTML(currentProfile?.username || currentUser.email)}</b>`;
        chatInput.disabled = false;
        sendButton.disabled = false;
      }

      await loadMessages();
      startRealtime();

      setInterval(loadNewMessages, 3000);

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          loadNewMessages();
        }
      });
    }

    async function loadMessages() {
      const { data, error } = await db
        .from(cfg.chatTable)
        .select("id, user_id, username, message, created_at")
        .order("created_at", { ascending: false })
        .limit(cfg.maxChatMessages);

      if (error) {
        chatMessages.innerHTML = `<p class="status danger">Chat se nepodařilo načíst.</p>`;
        console.error(error);
        return;
      }

      chatMessages.innerHTML = "";
      seenMessageIds.clear();
      lastMessageId = 0;

      const rows = [...data].reverse();

      if (rows.length === 0) {
        chatMessages.innerHTML = `<p class="status">Zatím tu nic není.</p>`;
        return;
      }

      rows.forEach(renderMessage);
    }

    async function loadNewMessages() {
      if (!db || isLoadingNewMessages) return;

      isLoadingNewMessages = true;

      try {
        if (!lastMessageId) {
          await loadMessages();
          return;
        }

        const { data, error } = await db
          .from(cfg.chatTable)
          .select("id, user_id, username, message, created_at")
          .gt("id", lastMessageId)
          .order("id", { ascending: true })
          .limit(50);

        if (error) {
          console.error(error);
          return;
        }

        if (data && data.length) {
          data.forEach(renderMessage);
        }
      } finally {
        isLoadingNewMessages = false;
      }
    }

    function startRealtime() {
      if (!db || chatChannel) return;

      chatChannel = db
        .channel("site-chat-live")
        .on(
          "postgres_changes",
          {
            event: "INSERT",
            schema: "public",
            table: cfg.chatTable
          },
          payload => {
            renderMessage(payload.new);
            setStatus("Chat je online.", false, true);
          }
        )
        .subscribe(status => {
          if (status === "SUBSCRIBED") {
            setStatus("Chat je online.", false, true);
          }

          if (status === "CHANNEL_ERROR") {
            setStatus("Realtime nejede, zapnutý je záložní refresh.", true);
          }

          if (status === "TIMED_OUT") {
            setStatus("Realtime timeout, zapnutý je záložní refresh.", true);
          }
        });
    }

    async function sendMessage() {
      if (!currentUser) {
        return setStatus("Nejdřív se přihlas.", true);
      }

      const message = chatInput.value.trim().slice(0, cfg.maxChatLength);

      if (!message) {
        return setStatus("Zpráva je prázdná.", true);
      }
      const now = Date.now();
const cooldownLeft = CHAT_COOLDOWN_MS - (now - lastChatSendAt);

if (cooldownLeft > 0) {
  return setStatus(`Počkej ještě ${(cooldownLeft / 1000).toFixed(1)}s.`, true);
}

lastChatSendAt = now;

      const username = currentProfile?.username || currentUser.email?.split("@")[0] || "user";

      chatInput.value = "";
      chatInput.focus();
      sendButton.disabled = true;
      setStatus("Posílám...");

      const { data, error } = await db
        .from(cfg.chatTable)
        .insert({
          user_id: currentUser.id,
          username,
          message
        })
        .select("id, user_id, username, message, created_at")
        .single();

      sendButton.disabled = false;

      if (error) {
        console.error(error);
        setStatus("Zpráva se neposlala.", true);
        chatInput.value = message;
        return;
      }

      renderMessage(data);
      setStatus("Odesláno.", false, true);

      setTimeout(loadNewMessages, 500);
    }

    chatInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    initChat();
  </script>
</body>
</html>
