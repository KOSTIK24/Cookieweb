<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Sušenka Web | FAQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">

  <style>
    .faq-list {
      display: grid;
      gap: 12px;
    }

    .faq-card {
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 16px;
    }

    .faq-card h2 {
      margin-bottom: 8px;
    }

    .faq-card p {
      color: var(--muted);
      margin-bottom: 0;
    }

    .status {
      color: var(--muted);
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="../images/susenka.png" alt="logo" class="brand-logo">
      <span class="brand-name">Sušenka <b>Web</b></span>
    </div>

    <nav class="nav">
      <a href="../index.html">Domů</a>
      <a href="hra.html">Hra</a>
      <a href="novinky.html">Novinky</a>
      <a href="chat.html">Chat</a>
      <a href="team.html">Team</a>
      <a href="kontakt.html">Kontakt</a>
      <a href="faq.html" class="active">FAQ</a>
      <a href="admin.html">Admin</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <section class="card hero animate-pop">
      <h1>FAQ ❓</h1>
      <p>Časté otázky k Sušenka Webu.</p>
    </section>

    <section class="card">
      <div id="faqList" class="faq-list">
        <p class="status">Načítám FAQ...</p>
      </div>
    </section>
  </main>

  <footer class="footer">© 2026 Sušenka Web</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/app.js"></script>

  <script>
    const db = window.SUSENKA.supabase;
    const cfg = window.SUSENKA.config;
    const faqList = document.getElementById("faqList");

    const fallbackFaq = [
      {
        question: "Co je Sušenka Web?",
        answer: "Komunitní web se hrami, chatem, novinkami a eventy."
      },
      {
        question: "Jak se dostanu do chatu?",
        answer: "Přihlas se přes Login a otevři stránku Chat."
      },
      {
        question: "Kde je Discord?",
        answer: "Discord najdeš na stránce Team."
      }
    ];

    function renderFaq(rows) {
      faqList.innerHTML = rows.map(item => `
        <article class="faq-card">
          <h2>${window.SUSENKA.escapeHTML(item.question)}</h2>
          <p>${window.SUSENKA.escapeHTML(item.answer)}</p>
        </article>
      `).join("");
    }

    async function loadFaq() {
      if (!db) {
        renderFaq(fallbackFaq);
        return;
      }

      const { data, error } = await db
        .from(cfg.faqTable)
        .select("id, question, answer, sort_order, is_visible")
        .eq("is_visible", true)
        .order("sort_order", { ascending: true })
        .order("id", { ascending: true });

      if (error) {
        console.error(error);
        renderFaq(fallbackFaq);
        return;
      }

      if (!data || data.length === 0) {
        renderFaq(fallbackFaq);
        return;
      }

      renderFaq(data);
    }

    loadFaq();
  </script>
</body>
</html>
