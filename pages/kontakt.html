<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Sušenka Web | Kontakt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">

  <style>
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .status {
      color: var(--muted);
      margin-top: 10px;
    }

    .success {
      color: #baffc9;
      font-weight: 800;
    }

    .danger {
      color: #ffb4b4;
      font-weight: 800;
    }

    @media (max-width: 850px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="../images/susenka.png" alt="logo" class="brand-logo">
      <span class="brand-name">Sušenka <b>Web</b></span>
    </div>

    <nav class="nav">
      <a href="../index.html">Domů</a>
      <a href="hra.html">Hra</a>
      <a href="novinky.html">Novinky</a>
      <a href="chat.html">Chat</a>
      <a href="team.html">Team</a>
      <a href="kontakt.html" class="active">Kontakt</a>
      <a href="faq.html">FAQ</a>
      <a href="admin.html">Admin</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <section class="card hero animate-pop">
      <h1>Kontakt 📩</h1>
      <p>Napiš zprávu admin teamu Sušenka Webu.</p>
    </section>

    <section class="card">
      <div class="contact-grid">
        <div class="panel-box">
          <h2>Napsat zprávu</h2>

          <div class="form-stack">
            <input id="contactName" maxlength="40" placeholder="Tvoje jméno">
            <input id="contactEmail" maxlength="120" placeholder="Email / Discord / kontakt">
            <textarea id="contactMessage" maxlength="1000" placeholder="Zpráva..."></textarea>
            <button class="btn primary" onclick="sendContact()">Odeslat</button>
          </div>

          <p id="contactStatus" class="status"></p>
        </div>

        <div class="panel-box">
          <h2>Discord 💬</h2>
          <p class="hint">Nejrychlejší kontakt je přes oficiální Discord server.</p>

          <div class="controls">
            <a class="btn primary" href="https://discord.gg/Sg6RhsrjJZ" target="_blank" rel="noopener noreferrer">
              Připojit se
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">© 2026 Sušenka Web</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/app.js"></script>

  <script>
    const db = window.SUSENKA.supabase;
    const cfg = window.SUSENKA.config;
    const statusEl = document.getElementById("contactStatus");

    function setStatus(text, danger = false) {
      statusEl.textContent = text;
      statusEl.className = danger ? "status danger" : "status success";
    }

    async function sendContact() {
      if (!db) {
        return setStatus("Databáze není nastavená.", true);
      }

      const name = document.getElementById("contactName").value.trim().slice(0, 40);
      const email = document.getElementById("contactEmail").value.trim().slice(0, 120);
      const message = document.getElementById("contactMessage").value.trim().slice(0, 1000);

      if (!name || !message) {
        return setStatus("Vyplň jméno a zprávu.", true);
      }

      const { error } = await db
        .from(cfg.contactsTable)
        .insert({
          name,
          email,
          message
        });

      if (error) {
        console.error(error);
        return setStatus("Zpráva se nepodařila odeslat.", true);
      }

      document.getElementById("contactName").value = "";
      document.getElementById("contactEmail").value = "";
      document.getElementById("contactMessage").value = "";

      setStatus("Zpráva odeslána.");
    }
  </script>
</body>
</html>
