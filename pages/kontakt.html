<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Sušenka Web | Kontakt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">

  <style>
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .form-stack {
      display: grid;
      gap: 10px;
    }

    .form-stack input,
    .form-stack textarea {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.22);
      color: white;
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
      font-family: inherit;
    }

    .form-stack textarea {
      min-height: 160px;
      resize: vertical;
    }

    .info-box {
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 16px;
    }

    .status {
      color: var(--muted);
    }

    .danger {
      color: #ffb4b4;
      font-weight: 800;
    }

    .success {
      color: #baffc9;
      font-weight: 800;
    }

    @media (max-width: 850px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="../images/susenka.png" alt="logo" class="brand-logo">
      <span class="brand-name">Sušenka <b>Web</b></span>
    </div>

    <nav class="nav">
      <a href="../index.html">Domů</a>
      <a href="hra.html">Hra</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="novinky.html">Novinky</a>
      <a href="chat.html">Chat</a>
      <a href="team.html">Team</a>
      <a href="kontakt.html" class="active">Kontakt</a>
      <a href="faq.html">FAQ</a>
      <a href="admin.html">Admin</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <section class="card hero animate-pop">
      <h1>Kontakt 📩</h1>
      <p>Napiš zprávu adminům Sušenka Webu.</p>
    </section>

    <section class="card">
      <div class="contact-grid">
        <div>
          <h2>Odeslat zprávu</h2>

          <div class="form-stack">
            <input id="contactName" maxlength="40" placeholder="Jméno">
            <input id="contactEmail" maxlength="120" type="email" placeholder="Email / Discord / kontakt">
            <textarea id="contactMessage" maxlength="1000" placeholder="Zpráva..."></textarea>
            <button class="btn primary" onclick="sendContact()">Odeslat</button>
          </div>

          <p id="contactStatus" class="status"></p>
        </div>

        <div class="info-box">
          <h2>Info</h2>
          <p class="status">
            Zprávy vidí admin v admin panelu. Neposílej hesla ani soukromé tokeny.
          </p>

          <div class="controls">
            <a class="btn" href="faq.html">FAQ</a>
            <a class="btn" href="chat.html">Chat</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">© 2026 Sušenka Web</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/app.js"></script>

  <script>
    const db = window.SUSENKA.supabase;
    const cfg = window.SUSENKA.config;
    const contactStatus = document.getElementById("contactStatus");

    function setContactStatus(text, danger = false) {
      contactStatus.textContent = text;
      contactStatus.className = danger ? "status danger" : "status success";
    }

    async function sendContact() {
      if (!db) {
        return setContactStatus("Databáze není nastavená.", true);
      }

      const name = document.getElementById("contactName").value.trim().slice(0, 40);
      const email = document.getElementById("contactEmail").value.trim().slice(0, 120);
      const message = document.getElementById("contactMessage").value.trim().slice(0, 1000);

      if (!name || !message) {
        return setContactStatus("Vyplň jméno a zprávu.", true);
      }

      const { error } = await db
        .from(cfg.contactsTable)
        .insert({
          name,
          email,
          message,
          is_read: false
        });

      if (error) {
        console.error(error);
        return setContactStatus("Zprávu se nepodařilo odeslat.", true);
      }

      document.getElementById("contactName").value = "";
      document.getElementById("contactEmail").value = "";
      document.getElementById("contactMessage").value = "";

      setContactStatus("Zpráva odeslána.");
    }
  </script>

  <script src="../config/global-widgets.js"></script>
</body>
</html>
