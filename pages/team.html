<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Sušenka Web | Team</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">

  <style>
    .team-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .team-card {
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .team-avatar {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      margin: 0 auto 10px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.1);
      font-size: 32px;
    }

    .status {
      color: var(--muted);
    }

    .danger {
      color: #ffb4b4;
      font-weight: 800;
    }

    @media (max-width: 850px) {
      .team-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="../images/susenka.png" alt="logo" class="brand-logo">
      <span class="brand-name">Sušenka <b>Web</b></span>
    </div>

    <nav class="nav">
      <a href="../index.html">Domů</a>
      <a href="hra.html">Hra</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="novinky.html">Novinky</a>
      <a href="chat.html">Chat</a>
      <a href="team.html" class="active">Team</a>
      <a href="kontakt.html">Kontakt</a>
      <a href="faq.html">FAQ</a>
      <a href="admin.html">Admin</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <section class="card hero animate-pop">
      <h1>Sušenka Team 👥</h1>
      <p>Lidi, kteří se starají o Sušenka Web.</p>
    </section>

    <section class="card">
      <h2>Team</h2>

      <div id="teamList" class="team-grid">
        <p class="status">Načítám team...</p>
      </div>
    </section>
  </main>

  <footer class="footer">© 2026 Sušenka Web</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/app.js"></script>

  <script>
    const db = window.SUSENKA.supabase;
    const cfg = window.SUSENKA.config;
    const teamList = document.getElementById("teamList");

    async function loadTeam() {
      if (!db) {
        teamList.innerHTML = `<p class="status danger">Databáze není nastavená.</p>`;
        return;
      }

      const { data, error } = await db
        .from(cfg.teamTable)
        .select("id, name, role, sort_order")
        .order("sort_order", { ascending: true })
        .order("id", { ascending: true });

      if (error) {
        console.error(error);
        teamList.innerHTML = `<p class="status danger">Team se nepodařilo načíst.</p>`;
        return;
      }

      if (!data || data.length === 0) {
        teamList.innerHTML = `
          <article class="team-card">
            <div class="team-avatar">🍪</div>
            <h3>Sušenka Team</h3>
            <p class="status">Team zatím není nastavený.</p>
          </article>
        `;
        return;
      }

      teamList.innerHTML = data.map(member => `
        <article class="team-card">
          <div class="team-avatar">👑</div>
          <h3>${window.SUSENKA.escapeHTML(member.name)}</h3>
          <p class="status">${window.SUSENKA.escapeHTML(member.role)}</p>
        </article>
      `).join("");
    }

    loadTeam();
  </script>

  <script src="../config/global-widgets.js"></script>
</body>
</html>
