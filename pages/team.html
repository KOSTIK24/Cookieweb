<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Sušenka Web | Team</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">

  <style>
    .team-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .member-card {
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .member-avatar {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      margin-bottom: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,.35);
    }

    .member-card h2 {
      margin: 6px 0;
      font-size: 20px;
    }

    .member-card p {
      color: var(--muted);
      margin: 0;
      font-weight: 800;
    }

    .discord-box {
      text-align: center;
    }

    .status {
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 900px) {
      .team-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .team-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="../images/susenka.png" alt="logo" class="brand-logo">
      <span class="brand-name">Sušenka <b>Web</b></span>
    </div>

    <nav class="nav">
      <a href="../index.html">Domů</a>
      <a href="hra.html">Hra</a>
      <a href="novinky.html">Novinky</a>
      <a href="chat.html">Chat</a>
      <a href="team.html" class="active">Team</a>
      <a href="admin.html">Admin</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <section class="card hero animate-pop">
      <h1>Sušenka Admin Team 👑</h1>
      <p>Oficiální admin team Sušenka serveru.</p>
    </section>

    <section class="card">
      <h2>Admin Team</h2>

      <div id="teamGrid" class="team-grid">
        <p class="status">Načítám team...</p>
      </div>
    </section>

    <section class="card discord-box">
      <h2>Discord server 💬</h2>
      <p class="hint">Připoj se na oficiální Sušenka Discord server.</p>

      <div class="controls">
        <a class="btn primary" href="https://discord.gg/Sg6RhsrjJZ" target="_blank" rel="noopener noreferrer">
          Připojit se na Discord
        </a>
      </div>
    </section>
  </main>

  <footer class="footer">© 2026 Sušenka Web</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/app.js"></script>

  <script>
    const db = window.SUSENKA.supabase;
    const cfg = window.SUSENKA.config;
    const teamGrid = document.getElementById("teamGrid");

    function fallbackTeam() {
      return [
        { name: "susa", role: "Admin" },
        { name: "susenka 6", role: "Admin" },
        { name: "susenka 3", role: "Owner" },
        { name: "susenka 4", role: "Admin" }
      ];
    }

    function renderTeam(rows) {
      teamGrid.innerHTML = rows.map(member => `
        <article class="member-card">
          <img src="../images/susenka.png" alt="${window.SUSENKA.escapeHTML(member.name)}" class="member-avatar">
          <h2>${window.SUSENKA.escapeHTML(member.name)}</h2>
          <p>${window.SUSENKA.escapeHTML(member.role)}</p>
        </article>
      `).join("");
    }

    async function loadTeam() {
      if (!db) {
        renderTeam(fallbackTeam());
        return;
      }

      const { data, error } = await db
        .from(cfg.teamTable)
        .select("id, name, role, sort_order")
        .order("sort_order", { ascending: true })
        .order("id", { ascending: true });

      if (error) {
        console.error(error);
        renderTeam(fallbackTeam());
        return;
      }

      if (!data || data.length === 0) {
        renderTeam(fallbackTeam());
        return;
      }

      renderTeam(data);
    }

    loadTeam();
  </script>
</body>
</html>
