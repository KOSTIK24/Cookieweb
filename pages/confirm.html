<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Sušenka Web | Ověření účtu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">

  <style>
    .confirm-box {
      text-align: center;
      max-width: 760px;
      margin: 0 auto;
    }

    .status {
      color: var(--muted);
    }

    .danger {
      color: #ffb4b4;
      font-weight: 800;
    }

    .success {
      color: #baffc9;
      font-weight: 800;
    }

    .code-box {
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 12px;
      word-break: break-word;
      text-align: left;
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="../images/susenka.png" alt="logo" class="brand-logo">
      <span class="brand-name">Sušenka <b>Web</b></span>
    </div>

    <nav class="nav">
      <a href="../index.html">Domů</a>
      <a href="hra.html">Hra</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="novinky.html">Novinky</a>
      <a href="chat.html">Chat</a>
      <a href="team.html">Team</a>
      <a href="kontakt.html">Kontakt</a>
      <a href="faq.html">FAQ</a>
      <a href="admin.html">Admin</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <section class="card hero animate-pop confirm-box">
      <h1>Ověření účtu 🔐</h1>
      <p id="confirmStatus" class="status">Kontroluju potvrzení emailu...</p>

      <div class="controls">
        <a class="btn primary" href="login.html">Jít na login</a>
        <a class="btn" href="../index.html">Domů</a>
      </div>

      <div id="debugBox" class="code-box" style="display:none;"></div>
    </section>
  </main>

  <footer class="footer">© 2026 Sušenka Web</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config/app.js"></script>

  <script>
    const db = window.SUSENKA.supabase;
    const confirmStatus = document.getElementById("confirmStatus");
    const debugBox = document.getElementById("debugBox");

    function setConfirmStatus(text, danger = false, success = false) {
      confirmStatus.textContent = text;
      confirmStatus.className = danger ? "status danger" : success ? "status success" : "status";
    }

    function showDebug(text) {
      debugBox.style.display = "block";
      debugBox.textContent = text;
    }

    async function handleConfirm() {
      if (!db) {
        setConfirmStatus("Databáze není nastavená.", true);
        return;
      }

      const url = new URL(window.location.href);
      const code = url.searchParams.get("code");

      const hash = window.location.hash || "";

      if (hash.includes("error=")) {
        const params = new URLSearchParams(hash.replace(/^#/, ""));
        const errorCode = params.get("error_code") || "unknown";
        const errorDescription = params.get("error_description") || params.get("error") || "Neznámá chyba";

        setConfirmStatus(`Ověření selhalo: ${errorCode}`, true);
        showDebug(decodeURIComponent(errorDescription.replace(/\+/g, " ")));
        return;
      }

      if (code) {
        const { error } = await db.auth.exchangeCodeForSession(code);

        if (error) {
          console.error(error);
          setConfirmStatus("Ověření se nepodařilo. Link mohl expirovat.", true);
          showDebug(error.message);
          return;
        }

        setConfirmStatus("Účet je ověřený. Teď se můžeš přihlásit.", false, true);

        setTimeout(() => {
          window.location.href = "login.html";
        }, 2500);

        return;
      }

      const { data, error } = await db.auth.getSession();

      if (error) {
        console.error(error);
        setConfirmStatus("Nepodařilo se zkontrolovat session.", true);
        showDebug(error.message);
        return;
      }

      if (data?.session) {
        setConfirmStatus("Účet je ověřený a jsi přihlášený.", false, true);
        return;
      }

      setConfirmStatus("Tahle stránka je připravená pro potvrzení emailu. Otevři ji přes link z emailu.", false);
    }

    handleConfirm();
  </script>

  <script src="../config/global-widgets.js"></script>
</body>
</html>
